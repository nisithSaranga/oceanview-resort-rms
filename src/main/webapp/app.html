<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanView RMS - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">OceanView RMS</span>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-light btn-sm" id="helpBtn">Help</button>
            <button class="btn btn-danger btn-sm" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">

        <!-- Create Reservation -->
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Create Reservation</div>
                <div class="card-body">
                    <form id="createReservationForm">
                        <div class="mb-2">
                            <label class="form-label">Full Name</label>
                            <input id="fullName" class="form-control" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Address</label>
                            <input id="address" class="form-control" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Contact Number</label>
                            <input id="contactNumber" class="form-control" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Room Type</label>
                            <select id="roomType" class="form-select" required>
                                <option value="STANDARD">STANDARD</option>
                                <option value="DELUXE">DELUXE</option>
                                <option value="SUITE">SUITE</option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Check In</label>
                            <input id="checkIn" type="date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Check Out</label>
                            <input id="checkOut" type="date" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Create Reservation</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Reservation Actions -->
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Reservation Actions</div>
                <div class="card-body">
                    <div class="mb-2">
                        <label class="form-label">Reservation No</label>
                        <input id="reservationNo" class="form-control" placeholder="RES-...">
                    </div>

                    <div class="d-grid gap-2 mb-3">
                        <button class="btn btn-outline-primary" id="getReservationBtn" type="button">Get Reservation</button>
                    </div>

                    <hr>

                    <div class="mb-2">
                        <label class="form-label">Change Room Type</label>
                        <select id="updateRoomType" class="form-select">
                            <option value="STANDARD">STANDARD</option>
                            <option value="DELUXE">DELUXE</option>
                            <option value="SUITE">SUITE</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-secondary" id="relocateBtn" type="button">Relocate Room</button>
                        <button class="btn btn-warning" id="cancelBtn" type="button">Cancel Reservation</button>
                        <button class="btn btn-danger" id="deleteBtn" type="button">Delete Reservation</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Billing -->
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Billing</div>
                <div class="card-body">
                    <div class="mb-2">
                        <label class="form-label">Reservation No</label>
                        <input id="billingReservationNo" class="form-control" placeholder="RES-...">
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-success" id="generateInvoiceBtn" type="button">Generate Invoice</button>
                        <button class="btn btn-outline-success" id="getInvoiceBtn" type="button">Get Invoice</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Output -->
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Response Output</div>
                <div class="card-body">
                    <pre id="output" class="bg-dark text-light p-3 rounded mb-0" style="min-height: 320px; white-space: pre-wrap;"></pre>
                </div>
            </div>
        </div>

    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const output = document.getElementById("output");
        if (output) {
            output.textContent = "Ready";
        }

        window.addEventListener("error", (e) => {
            if (output) {
                output.textContent = "JS ERROR: " + e.message;
            }
            console.error(e.error || e.message);
        });

        const createReservationForm = document.getElementById("createReservationForm");
        const checkInInput = document.getElementById("checkIn");
        const checkOutInput = document.getElementById("checkOut");
        const fullNameInput = document.getElementById("fullName");
        const addressInput = document.getElementById("address");
        const contactNumberInput = document.getElementById("contactNumber");

        function printResult(title, data) {
            if (!output) return;
            output.textContent = title + "\n\n" + JSON.stringify(data, null, 2);
        }

        function validateFullName() {
    if (!createReservationForm || !fullNameInput) return true;

    fullNameInput.setCustomValidity("");

    const fullName = fullNameInput.value.trim();
    const fullNamePattern = /^[A-Za-z\s]{2,100}$/;
    if (!fullName) {
        fullNameInput.setCustomValidity("Full name is required.");
        createReservationForm.reportValidity();
        return false;
    }
     if (!fullNamePattern.test(fullName)) {
        fullNameInput.setCustomValidity("Full name must contain letters ");
        createReservationForm.reportValidity();
        return false;
    }
    return true;
}
     function validateAddress() {
    if (!createReservationForm || !addressInput) return true;

    addressInput.setCustomValidity("");

    const address = addressInput.value.trim();
    const addressPattern = /^(?=.*[A-Za-z])[A-Za-z0-9\s,./#'-]{5,200}$/;

    if (!address) {
        addressInput.setCustomValidity("Address is required.");
        createReservationForm.reportValidity();
        return false;
    }

    if (!addressPattern.test(address)) {
        addressInput.setCustomValidity("Address must contain letters and may include digits,symbols");
        createReservationForm.reportValidity();
        return false;
    }

    return true;
}
    function validateContactNumber() {
    if (!createReservationForm || !contactNumberInput) return true;

    contactNumberInput.setCustomValidity("");

    const contactRaw = contactNumberInput.value.trim();
    const contactNormalized = normalizeContactNumber(contactRaw);
    const contactPattern = /^\+?\d{10,15}$/;

    if (!contactRaw) {
        contactNumberInput.setCustomValidity("Contact number is required.");
        createReservationForm.reportValidity();
        return false;
    }

    if (!contactPattern.test(contactNormalized)) {
        contactNumberInput.setCustomValidity("Contact Number must contain 10-15 digits");
        createReservationForm.reportValidity();
        return false;
    }

    contactNumberInput.value = contactNormalized;
    return true;
     }

    function formatDateLocal(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
}
        function addDays(dateString, days) {
            const date = new Date(dateString + "T00:00:00");
            date.setDate(date.getDate() + days);
            return formatDateLocal(date);
        }

        function getTodayStr() {
            return formatDateLocal(new Date());
        }

        function applyCreateReservationDateLimits() {
            if (!checkInInput || !checkOutInput) return;

            const todayStr = getTodayStr();
            checkInInput.min = todayStr;

            const baseCheckIn = (checkInInput.value && checkInInput.value >= todayStr)
                ? checkInInput.value
                : todayStr;

            checkOutInput.min = addDays(baseCheckIn, 1);

            if (checkInInput.value && checkInInput.value < todayStr) {
                checkInInput.value = "";
            }

            if (checkOutInput.value && checkOutInput.value < checkOutInput.min) {
                checkOutInput.value = "";
            }
        }

        function validateCreateReservationDates() {
            if (!checkInInput || !checkOutInput || !createReservationForm) return true;

            checkInInput.setCustomValidity("");
            checkOutInput.setCustomValidity("");

            const todayStr = getTodayStr();

            if (!checkInInput.value) {
                checkInInput.setCustomValidity("Check-in date is required.");
                createReservationForm.reportValidity();
                checkInInput.setCustomValidity("");
                return false;
            }

            if (!checkOutInput.value) {
                checkOutInput.setCustomValidity("Check-out date is required.");
                createReservationForm.reportValidity();
                checkOutInput.setCustomValidity("");
                return false;
            }

            if (checkInInput.value < todayStr) {
                checkInInput.setCustomValidity("Check-in cannot be in the past.");
                createReservationForm.reportValidity();
                checkInInput.setCustomValidity("");
                return false;
            }

            if (checkOutInput.value <= checkInInput.value) {
                checkOutInput.setCustomValidity("Check-out must be after check-in.");
                createReservationForm.reportValidity();
                checkOutInput.setCustomValidity("");
                return false;
            }
            return true;
         }
          function normalizeContactNumber(value) {
           return value.trim().replace(/[\s()-]/g, "");
                  }
        function validateCreateReservationTextFields() {
           if (!createReservationForm) return true;

           if (fullNameInput) fullNameInput.setCustomValidity("");
           if (addressInput) addressInput.setCustomValidity("");
           if (contactNumberInput) contactNumberInput.setCustomValidity("");

    const fullName = fullNameInput ? fullNameInput.value.trim() : "";
    const address = addressInput ? addressInput.value.trim() : "";
    const contactRaw = contactNumberInput ? contactNumberInput.value.trim() : "";
    const contactNormalized = normalizeContactNumber(contactRaw);

    const fullNamePattern = /^[A-Za-z\s]{2,100}$/;
    const addressPattern = /^(?=.*[A-Za-z])[A-Za-z0-9\s,./#'-]{5,200}$/;
    const contactPattern = /^\+?\d{7,15}$/;

    if (!fullName) {
        fullNameInput.setCustomValidity("Full name is required.");
        createReservationForm.reportValidity();
        fullNameInput.setCustomValidity("");
        return false;
    }

    if (!fullNamePattern.test(fullName)) {
        fullNameInput.setCustomValidity("Full name must contain letters only");
        createReservationForm.reportValidity();
        fullNameInput.setCustomValidity("");
        return false;
    }

    if (!address) {
        addressInput.setCustomValidity("Address is required.");
        createReservationForm.reportValidity();
        addressInput.setCustomValidity("");
        return false;
    }

    if (!addressPattern.test(address)) {
        addressInput.setCustomValidity("Address must contain letters and may include digits,symbols");
        createReservationForm.reportValidity();
        addressInput.setCustomValidity("");
        return false;
    }

    if (!contactRaw) {
        contactNumberInput.setCustomValidity("Contact Number is required.");
        createReservationForm.reportValidity();
        contactNumberInput.setCustomValidity("");
        return false;
    }

    if (!contactPattern.test(contactNormalized)) {
        contactNumberInput.setCustomValidity("Contact Number must contain 10-15 digits");
        createReservationForm.reportValidity();
        contactNumberInput.setCustomValidity("");
        return false;
    }

    if (contactNumberInput) {
        contactNumberInput.value = contactNormalized;
    }

    return true;
     }
        async function request(url, options = {}) {
            const defaultOptions = {
                credentials: "same-origin"
            };

            const finalOptions = { ...defaultOptions, ...options };

            if (finalOptions.body && !finalOptions.headers) {
                finalOptions.headers = { "Content-Type": "application/json" };
            }

            const response = await fetch(url, finalOptions);

            let data;
            try {
                data = await response.json();
            } catch (e) {
                data = {
                    message: "Non-JSON response",
                    status: response.status
                };
            }

            return {
                ok: response.ok,
                status: response.status,
                data: data
            };
        }

        function syncReservationNo(reservationNo) {
            if (reservationNo) {
                const reservationNoInput = document.getElementById("reservationNo");
                const billingReservationNoInput = document.getElementById("billingReservationNo");

                if (reservationNoInput) {
                    reservationNoInput.value = reservationNo;
                }

                if (billingReservationNoInput) {
                    billingReservationNoInput.value = reservationNo;
                }
            }
        }

        applyCreateReservationDateLimits();

        if (checkInInput) {
            checkInInput.addEventListener("change", () => {
                applyCreateReservationDateLimits();
                checkInInput.setCustomValidity("");
            });
        }

        if (checkOutInput) {
            checkOutInput.addEventListener("change", () => {
                checkOutInput.setCustomValidity("");
            });
        }
        if (fullNameInput) {
        fullNameInput.addEventListener("input", () => {
        fullNameInput.setCustomValidity("");
    });
}

        if (addressInput) {
        addressInput.addEventListener("input", () => {
         addressInput.setCustomValidity("");
    });
}

        if (contactNumberInput) {
        contactNumberInput.addEventListener("input", () => {
         contactNumberInput.setCustomValidity("");
    });
}
           const helpBtn = document.getElementById("helpBtn");
              if (helpBtn) {
            helpBtn.addEventListener("click", () => {
              window.location.href = "help.html";
         });
     }
        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
                const result = await request("logout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({})
                });
                printResult("POST /logout", result);

                if (result.ok) {
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 500);
                }
            });
        }

        if (createReservationForm) {
    createReservationForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        try {
            applyCreateReservationDateLimits();

            if (!createReservationForm.reportValidity()) {
                return;
            }
                  if (!validateFullName()) {
                   printResult("CLIENT VALIDATION", {
                     message:fullNameInput.validationMessage
                    });
               return;
                    }
                  if (!validateAddress()) {
                  printResult("CLIENT VALIDATION", {
                    message:addressInput.validationMessage
                    });

               return;
               }
               if (!validateContactNumber()) {
                  printResult("CLIENT VALIDATION", {
                    message:contactNumberInput.validationMessage
                    });
            return;
               }

    // Temporarily keep only the date validation in the path
            if (typeof validateCreateReservationDates === "function") {
                if (!validateCreateReservationDates()) {
                    return;
                }
            } else {
                printResult("CREATE RESERVATION JS ERROR", {
                    message: "validateCreateReservationDates is not defined"
                });
                return;
            }

            const payload = {
                fullName: document.getElementById("fullName").value.trim(),
                address: document.getElementById("address").value.trim(),
                contactNumber: normalizeContactNumber(document.getElementById("contactNumber").value),
                 roomType: document.getElementById("roomType").value,
                checkIn: document.getElementById("checkIn").value,
                checkOut: document.getElementById("checkOut").value
            };

            const result = await request("reservations", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (result.data && result.data.reservationNo) {
                syncReservationNo(result.data.reservationNo);
            }

            printResult("POST /reservations", result);

        } catch (err) {
            printResult("CREATE RESERVATION JS ERROR", {
                message: err.message,
                stack: err.stack
            });
        }
    });
}
        const getReservationBtn = document.getElementById("getReservationBtn");
        if (getReservationBtn) {
            getReservationBtn.addEventListener("click", async () => {
                const reservationNoInput = document.getElementById("reservationNo");
                const reservationNo = reservationNoInput ? reservationNoInput.value.trim() : "";

                const result = await request("reservations?reservationNo=" + encodeURIComponent(reservationNo), {
                    method: "GET"
                });

                if (result.data && result.data.reservationNo) {
                    syncReservationNo(result.data.reservationNo);
                }

                printResult("GET /reservations", result);
            });
        }

        const relocateBtn = document.getElementById("relocateBtn");
        if (relocateBtn) {
            relocateBtn.addEventListener("click", async () => {
                const reservationNoInput = document.getElementById("reservationNo");
                const updateRoomTypeInput = document.getElementById("updateRoomType");

                const payload = {
                    reservationNo: reservationNoInput ? reservationNoInput.value.trim() : "",
                    roomType: updateRoomTypeInput ? updateRoomTypeInput.value : ""
                };

                const result = await request("reservations", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                printResult("PUT /reservations (relocate)", result);
            });
        }

        const cancelBtn = document.getElementById("cancelBtn");
        if (cancelBtn) {
            cancelBtn.addEventListener("click", async () => {
                const reservationNoInput = document.getElementById("reservationNo");

                const payload = {
                    reservationNo: reservationNoInput ? reservationNoInput.value.trim() : "",
                    status: "CANCELLED"
                };

                const result = await request("reservations", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                printResult("PUT /reservations (cancel)", result);
            });
        }

        const deleteBtn = document.getElementById("deleteBtn");
        if (deleteBtn) {
            deleteBtn.addEventListener("click", async () => {
                const reservationNoInput = document.getElementById("reservationNo");
                const reservationNo = reservationNoInput ? reservationNoInput.value.trim() : "";

                const result = await request("reservations?reservationNo=" + encodeURIComponent(reservationNo), {
                    method: "DELETE"
                });

                printResult("DELETE /reservations", result);
            });
        }

        const generateInvoiceBtn = document.getElementById("generateInvoiceBtn");
        if (generateInvoiceBtn) {
            generateInvoiceBtn.addEventListener("click", async () => {
                const billingReservationNoInput = document.getElementById("billingReservationNo");

                const payload = {
                    reservationNo: billingReservationNoInput ? billingReservationNoInput.value.trim() : ""
                };

                const result = await request("billing", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                printResult("POST /billing", result);
            });
        }

        const getInvoiceBtn = document.getElementById("getInvoiceBtn");
        if (getInvoiceBtn) {
            getInvoiceBtn.addEventListener("click", async () => {
                const billingReservationNoInput = document.getElementById("billingReservationNo");
                const reservationNo = billingReservationNoInput ? billingReservationNoInput.value.trim() : "";

                const result = await request("billing?reservationNo=" + encodeURIComponent(reservationNo), {
                    method: "GET"
                });

                printResult("GET /billing", result);
            });
        }
    });
</script>
</body>
</html>
