<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanView RMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="mb-3">OceanView RMS</h2>
                    <p class="text-muted">Staff / Admin Login</p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" type="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <div id="loginMessage" class="alert mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    function showMessage(message, success) {
        loginMessage.className = success ? "alert alert-success mt-3" : "alert alert-danger mt-3";
        loginMessage.textContent = message;
    }

    loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const payload = {
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload),
                credentials: "same-origin"
            });

            const data = await response.json();

            if (response.ok && (data.success === undefined || data.success === true)) {
                showMessage(data.message || "Login successful", true);
                setTimeout(() => {
                    window.location.href = "app.html";
                }, 500);
            } else {
                showMessage(data.message || "Login failed", false);
            }
        } catch (error) {
            showMessage("Login request failed", false);
        }
    });
</script>
</body>
</html>
