<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanView RMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eaf7fb 0%, #f8f9fa 100%);
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .brand-mark {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #5ee7df 0%, #2f80ed 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 12px 28px rgba(47, 128, 237, 0.22);
        }

        .login-card {
            border: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
        }

        .login-top {
            background: linear-gradient(90deg, #0b3c5d 0%, #145374 55%, #1b6b85 100%);
            color: white;
        }
    </style>
</head>
<body >
<div class="container login-shell py-5">
    <div class="row justify-content-center w-100">
        <div class="col-md-7 col-lg-5">
            <div class="card login-card">
                <div class="card-body login-top p-4 p-md-5 text-center">
                    <div class="brand-mark mx-auto mb-3">OR</div>
                    <h2 class="mb-2">OceanView Resort RMS</h2>
                    <p class="mb-0 text-white-50">Staff and admin access portal</p>
                </div>

                <div class="card-body p-4 p-md-5">
                    <p class="text-muted mb-4 text-center">
                        Use your staff or admin credentials to access reservations, billing, and system operations.
                    </p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" type="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <div id="loginMessage" class="alert mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    function showMessage(message, success) {
        loginMessage.className = success ? "alert alert-success mt-3" : "alert alert-danger mt-3";
        loginMessage.textContent = message;
    }

    loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const payload = {
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload),
                credentials: "same-origin"
            });

            const data = await response.json();

            if (response.ok && (data.success === undefined || data.success === true)) {
                if (data.role) {
             sessionStorage.setItem("role", data.role);
            }
            showMessage(data.message || "Login successful", true);
             setTimeout(() => {
             window.location.href = "app.html";
              }, 500);
          } else {
                showMessage(data.message || "Login failed", false);
            }
        } catch (error) {
            showMessage("Login request failed", false);
        }
    });
</script>
</body>
</html>
